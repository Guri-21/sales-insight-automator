# ══════════════════════════════════════════════════════════════
# Sales Insight Automator — Docker Compose
# Spins up the full stack: backend + frontend
# ══════════════════════════════════════════════════════════════

services:
  # ── Backend API ──────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sia-backend
    ports:
      - "8000:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GROQ_MODEL=${GROQ_MODEL:-llama-3.3-70b-versatile}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - SENDER_EMAIL=${SENDER_EMAIL:-onboarding@resend.dev}
      - CORS_ORIGINS=http://localhost:3000,http://localhost:5173,http://localhost
      - API_KEY_REQUIRED=${API_KEY_REQUIRED:-false}
      - API_KEY=${API_KEY:-}
      - MAX_FILE_SIZE_MB=${MAX_FILE_SIZE_MB:-10}
      - ENV=production
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── Frontend ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8000
    container_name: sia-frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
