# ══════════════════════════════════════════════════════════════
# Sales Insight Automator — CI/CD Pipeline
# Triggers on PRs to main: lint, test, and Docker build validation
# ══════════════════════════════════════════════════════════════

name: CI Pipeline

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  # ── Backend: Lint & Test ─────────────────────────────────
  backend-checks:
    name: 🐍 Backend Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with Ruff
        run: ruff check .

      - name: Format check with Ruff
        run: ruff format --check .

      - name: Run tests
        env:
          GROQ_API_KEY: test-key
          RESEND_API_KEY: test-key
        run: python -m pytest tests/ -v --tb=short

  # ── Frontend: Lint & Build ──────────────────────────────
  frontend-checks:
    name: ⚛️ Frontend Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci || npm install

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: https://api.example.com

  # ── Docker: Build Validation ────────────────────────────
  docker-build:
    name: 🐳 Docker Build Validation
    runs-on: ubuntu-latest
    needs: [backend-checks, frontend-checks]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Backend Image
        run: docker build -t sia-backend ./backend

      - name: Build Frontend Image
        run: docker build -t sia-frontend ./frontend --build-arg VITE_API_URL=https://api.example.com

      - name: Verify images
        run: |
          echo "✅ Backend image size:"
          docker images sia-backend --format "{{.Size}}"
          echo "✅ Frontend image size:"
          docker images sia-frontend --format "{{.Size}}"
